version: "3.9"

services:
  nextjs:
    build: .
    container_name: nextjs_app
    restart: always
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "8080:8080"   # HTTP dev port
      - "8443:8443"   # HTTPS dev port
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/letsencrypt/live/localhost
    depends_on:
      - nextjs
